<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prayer Times</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #015374ce;
      color: #333;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      color: #2c3e50;
    }
    .prayer-times {
      display: inline-block;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .prayer {
      margin: 1rem 0;
      font-size: 1.2rem;
    }
    .time {
      font-weight: bold;
      color: #27ae60;
    }
  </style>
</head>
<body>
  
  <h1 class="site-title">Pakistanisch-Deutsches Kulturzentrum Regensburg e.V.(Bilal Mosque )</h1>

  <h1>Today's Prayer Times</h1>

  <div class="prayer-times">
    <div class="prayer">Fajr: <span class="time">04:30 AM</span></div>
    <div class="prayer">Dhuhr: <span class="time">12:15 PM</span></div>
    <div class="prayer">Asr: <span class="time">03:45 PM</span></div>
    <div class="prayer">Maghrib: <span class="time">06:30 PM</span></div>
    <div class="prayer">Isha: <span class="time">08:00 PM</span></div>
  </div>

</body>
</html>
